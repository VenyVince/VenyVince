name: Metrics

on:
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: VenyVince

          base: metadata

          plugin_habits: yes
          plugin_habits_days: 365
          plugin_habits_from: 200
          plugin_habits_facts: yes
